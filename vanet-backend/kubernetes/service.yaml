apiVersion: v1
kind: Service
metadata:
  name: vanet-backend-service
spec:
  selector:
    app: vanet-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
spec:
  selector:
    app: vanet-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: Secret
metadata:
  name: vanet-secrets
type: Opaque
stringData:
  db-username: postgres
  db-password: Athiya@123