version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgis/postgis:16-3.4
    container_name: vanet-postgres
    environment:
      POSTGRES_DB: roadsafety_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Athiya@123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vanet-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build: .
    container_name: vanet-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/roadsafety_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Athiya@123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vanet-network
    restart: unless-stopped

networks:
  vanet-network:
    driver: bridge

volumes:
  postgres_data: