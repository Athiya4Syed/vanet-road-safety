# Server
server.port=${PORT:8080}
spring.application.name=roadsafety-vanet

# Database (uses environment variables on Render)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/roadsafety_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Athiya@123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging
logging.level.com.vanet=INFO
logging.level.root=WARN