services:
  - type: web
    name: vanet-backend
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vanet-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: vanet-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: vanet-db
          property: password

databases:
  - name: vanet-db
    databaseName: roadsafety_db
    user: postgres